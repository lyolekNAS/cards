<!DOCTYPE html>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/navigation :: header(_)}"></head>
<body class="min-vh-100 d-flex justify-content-center align-items-center bg-light">

    <div class="container container-sm p-4 bg-white shadow-lg rounded-3 text-center my-4 flex-shrink-0">

        <div th:replace="~{fragments/navigation :: nav}"></div>
        <div th:if="${word != null}" id="cardForm">
            <h3 class="mb-4 text-primary" th:if="${word.id == 0}" th:text="|Редагування слова №${word.id}|"></h3>
            <h3 class="mb-4 text-primary" th:unless="${word.id == 0}">
                <a th:href="@{/edit-card(w=${word.english})}" class="text-reset text-decoration-none"
                   th:text="|Редагування слова №${word.id}|"></a>
            </h3>
            <div th:if="${randomListSize != null}" th:text="${randomListSize}"></div>
            <form th:action="@{/save}" th:object="${word}" method="post" class="text-start" id="wordForm">

                <input type="hidden" name="returnUrl" th:value="${returnUrl}" />

                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{englishCnt}"/>
                <input type="hidden" th:field="*{ukrainianCnt}"/>
                <input type="hidden" th:field="*{lastTrain}"/>
                <input type="hidden" th:field="*{nextTrain}"/>
                <input type="hidden" th:field="*{dictWordId}"/>

                <div class="mb-3">
                    <label for="englishInput" class="form-label fw-bold d-flex align-items-center gap-2">
                        <span>Англійське слово</span>
                        <span th:if="${word.dictWordFreqSum > 0}"
                              class="rarity-bars"
                              th:title="${#numbers.formatInteger(word.dictWordFreqSum, 3, 'WHITESPACE')}">
                            <span th:each="i : ${#numbers.sequence(1,5)}"
                                  th:classappend="${i <= word.rarity} ? ' active' : ''">
                            </span>
                        </span>
                    </label>
                    <input type="text" th:field="*{english}" class="form-control" id="englishInput" required/>
                </div>

                <div class="mb-3">
                    <label for="ukrainianInput" class="form-label fw-bold d-flex align-items-end gap-2">
                        <span class="label-text">Український переклад</span>
                        <span th:if="${word.getAitranslated}" class="small text-muted align-self-end">(AI)</span>

                        <a th:href="@{https://translate.google.com(sl='en', tl='uk', op='translate', text=${word.english})}"
                           target="_blank"
                           class="btn btn-outline-primary btn-sm align-self-end"
                           title="Перекласти у Google Translate">

                            <i class="bi bi-translate"
                               style="font-size: 1.25rem;"
                               aria-label="Google Translate Icon"></i>
                        </a>

                        <a th:href="@{/reset(w=${word.english}, id=${word.dictWordId})}"
                           class="btn btn-danger btn-sm align-self-end ms-auto"
                           sec:authorize="hasRole('CARDS_ADMIN')"
                           title="Повторно обробити">

                            <i class="bi bi-arrow-repeat"
                               style="font-size: 1.25rem;"></i>
                        </a>
                    </label>
                    <div class="input-group">
                        <textarea th:field="*{ukrainian}" class="form-control" id="ukrainianInput" required rows="3"></textarea>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="descriptionTextarea" class="form-label fw-bold">Опис</label>
                    <textarea th:field="*{description}" class="form-control" id="descriptionTextarea" rows="4"></textarea>
                </div>

                <div class="mb-4">
                    <label for="stateSelect" class="form-label fw-bold">Стан вивчення</label>
                    <select th:field="*{state}" class="form-select" id="stateSelect">
                        <option th:each="s : ${T(org.sav.fornas.cards.client.cardsback.model.WordDto.StateEnum).values()}"
                                th:value="${s}"
                                th:text="${s}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2 mt-4">

                    <button th:if="${word.id == 0}" type="submit" th:formaction="@{/setSkipped}"
                            class="btn btn-secondary w-100 pressable"
                            title="Не цікаво / Пропустити">
                        <i class="bi-emoji-dizzy" style="font-size: 1.5rem;"></i>
                    </button>

                    <button type="submit" class="btn btn-primary w-100 pressable"
                            title="Зберегти зміни">
                        <i class="bi bi-emoji-heart-eyes" style="font-size: 1.5rem;"></i>
                    </button>

                    <button th:if="${word.id == 0}" type="submit" th:formaction="@{/setKnown}"
                            class="btn btn-success w-100 pressable"
                            title="Знаю">
                        <i class="bi bi-emoji-sunglasses" style="font-size: 1.5rem;"></i>
                    </button>

                </div>

                <div class="mt-3" th:if="${returnUrl != null and #strings.startsWith(returnUrl, '/findWordToSuggest')}">
                    <label for="suggestLevelSelect" class="form-label fw-bold">Level</label>
                    <select id="suggestLevelSelect" class="form-select">
                        <option th:each="i : ${#numbers.sequence(1, 5)}"
                                th:value="${i}"
                                th:text="${i}"
                                th:selected="${level != null and level == i}">
                        </option>
                    </select>
                </div>

            </form>
        </div>
        <div th:if="${word == null}">То мабуть ще завантажується</div>
    </div>
<script th:inline="javascript">

    const editBaseUrl = /*[[@{/edit}]]*/ '';
    const findWordToSuggestBaseUrl = /*[[@{/findWordToSuggest}]]*/ '';
    const returnUrl = /*[[${returnUrl}]]*/ '';
    const englishInput = document.getElementById('englishInput');

    // Якщо returnUrl містить findWordToSuggest, приховуємо значення
    const isFromFindWordToSuggest = returnUrl && returnUrl.startsWith('/findWordToSuggest');
    if (isFromFindWordToSuggest) {
        // Зберігаємо оригінальне значення
        englishInput.dataset.originalValue = englishInput.value;
        englishInput.value = '';

        // При першому кліку показуємо значення
        document.getElementById('cardForm').addEventListener('click', function() {
            if (englishInput.value === '' && englishInput.dataset.originalValue) {
                englishInput.value = englishInput.dataset.originalValue;
                englishInput.removeAttribute('data-original-value');
            }
        }, { once: true });
    }

    englishInput.addEventListener('change', function () {
        const value = this.value.trim();
        if (value.length > 0) {
            window.location.href = editBaseUrl + '?w=' + encodeURIComponent(value);
        }
    });

    const suggestLevelSelect = document.getElementById('suggestLevelSelect');
    if (suggestLevelSelect) {
        suggestLevelSelect.addEventListener('change', function () {
            window.location.href = findWordToSuggestBaseUrl + '/' + this.value;
        });
    }

    let val = document.getElementById("wordForm");
    val.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
            const tag = event.target && event.target.tagName;
            if (tag !== 'TEXTAREA') {
                event.preventDefault();
            }
        }
    });
</script>

</body>
</html>
